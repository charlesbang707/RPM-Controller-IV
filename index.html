<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J1939 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 420px; padding: 10px; box-sizing: border-box; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #status { font-size: 16px; font-weight: bold; color: #4caf50; text-transform: uppercase; }
        .conn-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }

        /* SA 설정 영역 (image_6b64c4.jpg 완벽 재현) */
        .addr-bar { background: #1c1c1e; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .addr-label { font-size: 11px; color: #666; white-space: nowrap; font-weight: bold; }
        #saInput { width: 60px; background: #2c2c2e; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; text-align: center; font-size: 14px; }
        #saSelect { flex: 1; background: #2c2c2e; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 14px; }
        .set-btn { background: #007aff; color: white; border: none; padding: 8px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* 게이지 영역 */
        #gauge-container { position: relative; width: 340px; height: 340px; margin: 0 auto; }
        
        /* Target RPM 표시 복구 (image_6b64c4.jpg 기준) */
        #target-display { font-size: 28px; color: #2196f3; margin-top: 10px; margin-bottom: 20px; font-weight: bold; width: 100%; text-align: left; padding-left: 20px; }

        .baud-bar { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .baud-btn { flex: 1; background: #1c1c1e; color: #888; border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .baud-btn.active { border-color: #007aff; color: #2196f3; background: #1c1c1e; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .ctrl-btn { padding: 30px 0; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; color: white; cursor: pointer; }
        #resume { background: #4caf50; }
        #up     { background: #2196f3; }
        #stop   { background: #f44336; }
        #down   { background: #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div id="status">CONNECTED</div>
        <button class="conn-btn" id="connBtn" onclick="toggleConnect()">DISCONNECT</button>
    </div>

    <div class="addr-bar">
        <span class="addr-label">SOURCE ADDR</span>
        <input type="text" id="saInput" value="229" placeholder="SA">
        <select id="saSelect" onchange="document.getElementById('saInput').value = this.value.split('(')[1] ? parseInt(this.value.split('(')[1], 16) || this.value.split('(')[1].replace(')','') : this.value">
            <option value="229">Mack (0xE5)</option>
            <option value="242">Cummins (0xF2)</option>
            <option value="231">Detroit (0xE7)</option>
            <option value="3">PACCAR MX (0x03)</option>
            <option value="11">Volvo (0x0B)</option>
            <option value="3">International (0x03)</option>
        </select>
        <button class="set-btn" onclick="setSA()">SET</button>
    </div>

    <div id="gauge-container">
        <canvas id="gauge-rpm"></canvas>
    </div>
    
    <div id="target-display">Target: 0</div>

    <div class="baud-bar">
        <button id="b250" class="baud-btn" onclick="changeBaud(250)">250 kbps</button>
        <button id="b500" class="baud-btn active" onclick="changeBaud(500)">500 kbps</button>
    </div>

    <div class="control-grid">
        <button id="resume" class="ctrl-btn">RESUME</button>
        <button id="up"     class="ctrl-btn">UP</button>
        <button id="stop"   class="ctrl-btn">STOP</button>
        <button id="down"   class="ctrl-btn">DOWN</button>
    </div>
</div>

<script>
    let device, char;
    const S_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const C_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    // 게이지 스타일 복구 (image_6b7ba3.jpg 중앙 박스 및 핑크 바늘 재현)
    const gauge = new RadialGauge({
        renderTo: 'gauge-rpm',
        width: 340, height: 340, minValue: 0, maxValue: 3000,
        majorTicks: ["0","500","1000","1500","2000","2500","3000"],
        highlights: [
            { from: 0, to: 1300, color: "rgba(0,122,255,0.3)" },
            { from: 2500, to: 3000, color: "rgba(255,0,0,0.5)" }
        ],
        colorPlate: "#000", colorMajorTicks: "#ddd", colorNumbers: "#ccc",
        needleType: "arrow", needleWidth: 3, needleColor: "#f08080",
        valueBox: true, 
        colorValueBoxRect: "#555", colorValueBoxRectEnd: "#444", // 중앙 회색 박스
        colorValueText: "#2196f3", fontValueSize: 45,
        borderShadowWidth: 0, borders: false,
        animationDuration: 150
    }).draw();

    async function toggleConnect() {
        if (device && device.gatt.connected) {
            await device.gatt.disconnect();
            updateUI(false);
            return;
        }
        try {
            device = await navigator.bluetooth.requestDevice({
                filters: [{ name: "Truck_RPM_Control" }], optionalServices: [S_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(S_UUID);
            char = await service.getCharacteristic(C_UUID);
            updateUI(true);
            
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                const rpm = e.target.value.getUint16(0, true);
                const target = e.target.value.getUint16(2, true);
                gauge.value = rpm;
                document.getElementById('target-display').innerText = `Target: ${target}`;
            });
        } catch (e) { console.log(e); }
    }

    function updateUI(connected) {
        const s = document.getElementById('status');
        const b = document.getElementById('connBtn');
        s.innerText = connected ? "CONNECTED" : "DISCONNECTED";
        s.style.color = connected ? "#4caf50" : "#f44336";
        b.innerText = connected ? "DISCONNECT" : "CONNECT";
    }

    // 버튼 동작 수정
    document.getElementById('resume').onclick = () => sendVal(1);
    document.getElementById('up').onclick = () => sendVal(2);
    document.getElementById('stop').onclick = () => sendVal(3);
    document.getElementById('down').onclick = () => sendVal(4);

    async function sendVal(v) { if (char) await char.writeValue(new Uint8Array([v])); }

    function setSA() {
        const addr = parseInt(document.getElementById('saInput').value);
        if (char && !isNaN(addr)) char.writeValue(new Uint8Array([0xA5, addr]));
    }

    function changeBaud(b) {
        document.getElementById('b250').classList.toggle('active', b === 250);
        document.getElementById('b500').classList.toggle('active', b === 500);
        sendVal(b === 250 ? 5 : 6);
    }
</script>
</body>
</html>
